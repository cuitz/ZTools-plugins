<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>通用页面布局</title>
    <style>
        /* 基础样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 页面容器 */
        .page-container {
            width: 100vw;     /* 视口宽度 */
            height: 100vh;    /* 视口高度 */
            overflow: hidden; /* 隐藏外层滚动条 */
            display: flex;
            flex-direction: column;
            background: #f5f5f5;
        }

        /* 顶部导航区域 */
        .header {
            height: 60px;
            background: #ffffff;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            flex-shrink: 0; /* 防止被压缩 */
        }

        /* 主内容区域 */
        .main-content {
            flex: 1;
            display: flex;
            overflow: hidden; /* 防止内部溢出影响外层 */
            gap: 16px;       /* 子元素间距 */
            padding: 16px;
        }

        /* 侧边栏 */
        .sidebar {
            width: 240px;
            background: #ffffff;
            border-radius: 8px;
            overflow-y: auto; /* 垂直滚动条 */
            padding: 16px;
            flex-shrink: 0;
        }

        /* 内容区域 */
        .content-area {
            flex: 1;
            background: #ffffff;
            border-radius: 8px;
            overflow-y: auto; /* 垂直滚动条 */
            padding: 24px;
        }

        /* 模拟长内容 */
        .mock-content {
            height: 1500px; /* 测试滚动条 */
            border: 1px dashed #ccc;
        }
    </style>
</head>
<body>
    <div class="page-container">
        <header class="header">Header Content</header>
        <div class="main-content">
            <aside class="sidebar">
                <div class="mock-content">Sidebar Content</div>
            </aside>
            <main class="content-area">
                <div class="mock-content">Main Content</div>
            </main>
        </div>
    </div>
</body>
</html>
